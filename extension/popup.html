<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>JobPilot AI</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div class="logo">
        <div class="badge">JP</div>
        <div>
          <div class="title">JobPilot AI</div>
          <div id="connection" class="muted">checking…</div>
        </div>
      </div>
    </header>

    <main>
      <section id="not-connected" hidden>
        <p class="muted">Sign in to JobPilot in your browser, then open the
          <strong>Browser Extension</strong> page and click <em>Connect extension</em>.</p>
        <button id="open-app" class="primary">Open JobPilot</button>
      </section>

      <section id="connected" hidden>
        <div id="page-info" class="card">
          <div class="muted">Current page</div>
          <div id="page-url" class="mono"></div>
          <div id="ats-line" class="muted small"></div>
        </div>

        <button id="autofill" class="primary">Auto-fill this application</button>
        <button id="scan" class="ghost">Scan fields only</button>

        <div id="status" class="status" hidden></div>

        <details>
          <summary>Activity log</summary>
          <ul id="log"></ul>
        </details>
      </section>
    </main>

    <footer>
      <button id="disconnect" class="link" hidden>Disconnect</button>
      <span class="muted small">v0.1.0</span>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
